name: test

on:
  push: { branches: [main] }
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/**'
              - 'tests/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'vitest.config.ts'
            frontend:
              - 'gym-workout-frontend/**'
            infra:
              - 'Dockerfile'
              - 'docker-compose.yml'
              - 'src/infrastructure/database/schema.sql'

  backend-unit:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci
      - run: npx vitest run --project unit

  backend-integration:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci
      - run: npx vitest run --project integration --project graph --project api
        env:
          OPENROUTER_API_KEY: test-key

  infra:
    needs: changes
    if: needs.changes.outputs.infra == 'true' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci
      - run: npx vitest run --project infra

  frontend-component:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: gym-workout-frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm', cache-dependency-path: gym-workout-frontend/package-lock.json }
      - run: npm ci
      - run: npx vitest run

  frontend-e2e:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: gym-workout-frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm', cache-dependency-path: gym-workout-frontend/package-lock.json }
      - run: npm ci
      - run: npx playwright install --with-deps chromium webkit
      - run: npx playwright test --config tests/playwright.config.ts
        env: { CI: '1' }
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: gym-workout-frontend/playwright-report
          retention-days: 14

  live-openrouter:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci
      - run: npx vitest run tests/live --no-coverage
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
