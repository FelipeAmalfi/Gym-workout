services:
  - type: web
    name: gym-workout-api
    env: docker
    plan: free
    branch: main
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENROUTER_API_KEY
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: HTTP_REFERER
        value: https://gym-workout-api.onrender.com
      - key: X_TITLE
        value: Gym Workout Assistant
      - key: POSTGRES_HOST
        sync: false
      - key: POSTGRES_PORT
        value: "5432"
      - key: POSTGRES_DB
        value: postgres
      - key: POSTGRES_USER
        sync: false
      - key: POSTGRES_PASSWORD
        sync: false
      - key: FRONTEND_URL
        sync: false
