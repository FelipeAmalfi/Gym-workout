version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: gym_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gymworkout
      POSTGRES_USER: gym
      POSTGRES_PASSWORD: gympassword
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gym -d gymworkout"]
      interval: 5s
      timeout: 5s
      retries: 10
